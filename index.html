<!DOCTYPE html>
<html>
<head>
  <title>HAKKUHGROUND</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      overflow-x: hidden;
    }

    /* NOISE OVERLAY */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: url("https://grainy-gradients.vercel.app/noise.svg");
      opacity: 0.08;
      pointer-events: none;
      z-index: 999;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 80px 20px;
      text-align: center;
    }

    h1 {
      font-size: 52px;
      letter-spacing: 8px;
      margin-bottom: 10px;
    }

    .tagline {
      color: #aaa;
      letter-spacing: 3px;
      margin-bottom: 40px;
    }

    /* FLICKER ANIMATION */
    .motto {
      margin: 40px 0;
      font-size: 16px;
      letter-spacing: 4px;
      color: #ff0033;
      animation: flicker 2s infinite;
    }

    @keyframes flicker {
      0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
      20%, 24%, 55% { opacity: 0.2; }
    }

    /* PLAYER / PLACEHOLDER */
    .player {
      margin-top: 40px;
      border: 1px solid #222;
      padding: 20px;
      border-radius: 10px;
    }

    iframe {
      width: 100%;
      height: 300px;
      border: none;
      border-radius: 10px;
    }

    .placeholder {
      color: #666;
      font-size: 14px;
      letter-spacing: 2px;
    }

    /* LINKS */
    .links {
      margin-top: 50px;
    }

    .link-item {
      display: block;
      padding: 15px;
      margin-bottom: 10px;
      border: 1px solid #222;
      text-decoration: none;
      color: #ccc;
      letter-spacing: 2px;
      position: relative;
      overflow: hidden;
      transition: 0.2s;
    }

    /* GLITCH HOVER */
    .link-item::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,0,50,0.2), transparent);
      opacity: 0;
      transition: 0.3s;
    }

    .link-item:hover {
      color: #fff;
      border-color: #ff0033;
      transform: translateX(5px);
    }

    .link-item:hover::before {
      opacity: 1;
    }

    /* FOOTER */
    .footer {
      margin-top: 80px;
      font-size: 12px;
      color: #444;
      letter-spacing: 2px;
    }

    /* MOBILE */
    @media (max-width: 600px) {
      h1 {
        font-size: 36px;
        letter-spacing: 4px;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <h1>HAKKUHGROUND</h1>

  <div class="tagline">
    HARDCORE / GABBER / MILLENNIUM
  </div>

  <div class="motto">
    NO ZAAG KICKS
  </div>

  <!-- PLAYER / EMPTY STATE -->
  <div class="player">
    <div class="placeholder">
      NO RELEASES YET<br><br>
      FIRST DROP COMING SOON
    </div>
  </div>

  <!-- LINKS -->
  <div class="links">

    <a href="https://soundcloud.com/hakkuhground" target="_blank" class="link-item">
      SOUNDCLOUD
    </a>

    <a href="#" class="link-item">
      BANDCAMP (COMING SOON)
    </a>

    <a href="mailto:djdynex.business@outlook.com" class="link-item">
      CONTACT
    </a>

  </div>

</div>

<div class="footer">
  © 2026 HAKKUHGROUND
</div>

</body>
</html>
